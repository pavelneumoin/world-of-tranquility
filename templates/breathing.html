<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир спокойствия - Дыхание</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/tranquility/static/css/style.css">
    <link rel="stylesheet" href="/tranquility/static/css/v2.css?v=2">
    <style>
        .breathing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            margin-top: 2rem;
        }

        .breath-circle-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .breath-circle-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);
            transition: all 4s ease-in-out, box-shadow 4s ease-in-out;
        }

        .breath-circle-inner {
            position: absolute;
            width: 50%;
            height: 50%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            transition: all 4s ease-in-out;
            z-index: 2;
        }

        /* Анимации (управляются через JS классы) */
        .breathing-inhale .breath-circle-inner {
            transform: scale(2);
            /* Расширяется до границ outer */
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        .breathing-inhale .breath-circle-outer {
            box-shadow: 0 0 80px rgba(16, 185, 129, 0.6);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .breathing-hold .breath-circle-inner {
            transform: scale(2);
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
        }

        .breathing-hold .breath-circle-outer {
            box-shadow: 0 0 80px rgba(59, 130, 246, 0.7);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .breathing-exhale .breath-circle-inner {
            transform: scale(1);
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        }

        .breathing-exhale .breath-circle-outer {
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.2);
        }

        .breath-text {
            position: absolute;
            z-index: 3;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
            opacity: 1;
            transition: opacity 0.3s;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn-stop {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-stop:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Выбор техники */
        .technique-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .technique-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .technique-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .technique-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .breathing-hold-out .breath-circle-inner {
            transform: scale(1);
            background: linear-gradient(135deg, #1e3a8a, #312e81);
        }

        .breathing-hold-out .breath-circle-outer {
            box-shadow: 0 0 20px rgba(30, 58, 138, 0.5);
            border-color: rgba(30, 58, 138, 0.4);
        }
    </style>
</head>

<body>
    <nav>
        <div class="container nav-container">
            <a href="/tranquility/" class="logo">
                <i class="fas fa-spa"></i>
                <span>Мир спокойствия</span>
            </a>
            <ul class="nav-links">
                <li><a href="/tranquility/">Главная</a></li>
                <li><a href="/tranquility/breathing" style="color: var(--secondary-color);">Дыхание</a></li>
                <li><a href="/tranquility/techniques">Техники</a></li>
                <li><a href="/tranquility/statistics">Статистика</a></li>
                <li><a href="/tranquility/questionnaire">Анкета</a></li>
                <li><a href="/tranquility/journal">Журнал</a></li>
                <li><a href="/tranquility/media">Медиа</a></li>
                <li><a href="/tranquility/emergency">Помощь</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="breathing-container">
            <h1 id="bHeading" style="margin-bottom: 10px;">Дыхание 4-7-8</h1>

            <div class="technique-selector">
                <button class="technique-btn active" onclick="selectTechnique('4-7-8')">4-7-8</button>
                <button class="technique-btn" onclick="selectTechnique('box')">Квадратное</button>
                <button class="technique-btn" onclick="selectTechnique('resonant')">Равномерное</button>
                <button class="technique-btn" onclick="selectTechnique('4-2-4')">Очищающее</button>
            </div>

            <p id="bDesc" style="color: var(--text-muted); margin-bottom: 40px; text-align: center; max-width: 600px;">
                Глубокое диафрагмальное дыхание для мгновенного снятия стресса и переключения нервной системы в режим
                отдыха.
            </p>

            <div class="breath-circle-wrapper" id="breathWrapper">
                <div class="breath-circle-outer"></div>
                <div class="breath-circle-inner" id="innerCircle"></div>
                <div class="breath-text" id="breathText">Нажмите "Старт"</div>
            </div>

            <div class="controls">
                <button class="btn btn-hero" id="startBtn" onclick="startExercise()">
                    <i class="fas fa-play"></i> Старт
                </button>
                <button class="btn btn-stop" id="stopBtn" onclick="stopExercise()" style="display: none;">
                    <i class="fas fa-stop"></i> Стоп
                </button>
            </div>
        </div>
    </main>

    <script src="/tranquility/static/js/main.js"></script>
    <script>
        let isBreathing = false;
        let timeoutIds = [];
        let cycleId = null;
        let currentTechnique = '4-7-8';

        const wrapper = document.getElementById('breathWrapper');
        const text = document.getElementById('breathText');
        const innerCircle = document.getElementById('innerCircle');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const uiHeading = document.getElementById('bHeading');
        const uiDesc = document.getElementById('bDesc');

        const techniques = {
            '4-7-8': {
                name: 'Дыхание 4-7-8',
                desc: 'Глубокое диафрагмальное дыхание для мгновенного снятия стресса и переключения нервной системы в режим отдыха.',
                cycleTime: 19000,
                phases: [
                    { name: 'Вдох... (4)', class: 'breathing-inhale', duration: 4000, transition: '4s' },
                    { name: 'Задержка... (7)', class: 'breathing-hold', duration: 7000, transition: '0s' },
                    { name: 'Медленный выдох... (8)', class: 'breathing-exhale', duration: 8000, transition: '8s' }
                ]
            },
            'box': {
                name: 'Квадратное дыхание',
                desc: 'Равные интервалы (4 сек) для концентрации, баланса и снятия тревоги. Идеально перед сложным заданием.',
                cycleTime: 16000,
                phases: [
                    { name: 'Вдох... (4)', class: 'breathing-inhale', duration: 4000, transition: '4s' },
                    { name: 'Задержка... (4)', class: 'breathing-hold', duration: 4000, transition: '0s' },
                    { name: 'Выдох... (4)', class: 'breathing-exhale', duration: 4000, transition: '4s' },
                    { name: 'Задержка... (4)', class: 'breathing-hold-out', duration: 4000, transition: '0s' }
                ]
            },
            'resonant': {
                name: 'Равномерное дыхание',
                desc: 'Плавные циклы по 5 секунд (6 вдохов в минуту). Синхронизирует сердечный ритм и успокаивает ум.',
                cycleTime: 10000,
                phases: [
                    { name: 'Плавный вдох... (5)', class: 'breathing-inhale', duration: 5000, transition: '5s' },
                    { name: 'Плавный выдох... (5)', class: 'breathing-exhale', duration: 5000, transition: '5s' }
                ]
            },
            '4-2-4': {
                name: 'Очищающее дыхание',
                desc: 'Короткая пауза на высоте вдоха. Помогает сбросить напряжение мышц грудной клетки.',
                cycleTime: 10000,
                phases: [
                    { name: 'Вдох... (4)', class: 'breathing-inhale', duration: 4000, transition: '4s' },
                    { name: 'Пауза... (2)', class: 'breathing-hold', duration: 2000, transition: '0s' },
                    { name: 'Выдох... (4)', class: 'breathing-exhale', duration: 4000, transition: '4s' }
                ]
            }
        };

        function selectTechnique(id) {
            if (isBreathing) stopExercise();

            currentTechnique = id;
            const tech = techniques[id];
            uiHeading.textContent = tech.name;
            uiDesc.textContent = tech.desc;

            // Обновляем UI кнопок
            document.querySelectorAll('.technique-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(tech.name) ||
                    (id === '4-7-8' && btn.textContent === '4-7-8') ||
                    (id === 'box' && btn.textContent === 'Квадратное') ||
                    (id === 'resonant' && btn.textContent === 'Равномерное') ||
                    (id === '4-2-4' && btn.textContent === 'Очищающее')) {
                    btn.classList.add('active');
                }
            });
        }

        function runCycle() {
            if (!isBreathing) return;
            const tech = techniques[currentTechnique];
            let accumulatedTime = 0;

            tech.phases.forEach((phase, index) => {
                let t = setTimeout(() => {
                    if (!isBreathing) return;
                    wrapper.className = `breath-circle-wrapper ${phase.class}`;
                    if (phase.transition !== '0s') {
                        innerCircle.style.transition = `all ${phase.transition} ease-in-out`;
                    }
                    text.textContent = phase.name;
                }, accumulatedTime);

                accumulatedTime += phase.duration;
                timeoutIds.push(t);
            });
        }

        function startExercise() {
            if (isBreathing) return;
            isBreathing = true;

            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';

            const tech = techniques[currentTechnique];
            runCycle();
            cycleId = setInterval(runCycle, tech.cycleTime);

            fetch('/tranquility/api/start-breathing', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ technique: currentTechnique, startTime: new Date().toISOString() })
            }).catch(e => console.log(e));
        }

        function stopExercise() {
            isBreathing = false;
            clearInterval(cycleId);
            timeoutIds.forEach(clearTimeout);
            timeoutIds = [];

            wrapper.className = 'breath-circle-wrapper';
            innerCircle.style.transition = 'all 1s ease';
            text.textContent = 'Остановлено';

            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            startBtn.innerHTML = '<i class="fas fa-redo"></i> Начать заново';
        }
    </script>
    <script src="/tranquility/static/js/v2.js?v=2" defer></script>
</body>

</html>
