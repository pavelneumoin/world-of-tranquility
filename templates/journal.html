<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир спокойствия - Дневник</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/tranquility/static/css/style.css">
</head>

<body class="page-journal">
    <nav>
        <div class="nav-container">
            <a href="/tranquility/" class="logo">
                <i class="fas fa-spa"></i>
                <span>Мир спокойствия</span>
            </a>
            <ul class="nav-links">
                <li><a href="/tranquility/">Главная</a></li>
                <li><a href="/tranquility/breathing">Дыхание</a></li>
                <li><a href="/tranquility/techniques">Техники</a></li>
                <li><a href="/tranquility/statistics">Статистика</a></li>
                <li><a href="/tranquility/questionnaire">Анкета</a></li>
                <li><a href="/tranquility/journal" style="color: var(--secondary-color);">Журнал</a></li>
                <li><a href="/tranquility/media">Медиа</a></li>
                <li><a href="/tranquility/emergency">Помощь</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width: 800px; margin-top: 3rem; margin-bottom: 3rem;">
        <div class="stress-tracker" style="text-align: left;">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-book-open"></i> Дневник эмоций</h2>
            <p style="margin-bottom: 30px;">Записывайте свои мысли, чтобы освободить разум и проанализировать триггеры
                стресса.</p>

            <form id="journalForm">
                <div class="form-group">
                    <label>Как вы себя чувствуете сейчас?</label>
                    <select id="mood" class="form-control" required
                        style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
                        <option value="Спокойно" style="color: #000;">Спокойно</option>
                        <option value="Тревожно" style="color: #000;">Тревожно</option>
                        <option value="Грустно" style="color: #000;">Грустно</option>
                        <option value="Радостно" style="color: #000;">Радостно</option>
                        <option value="Устало" style="color: #000;">Устало</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Опишите ваши мысли:</label>
                    <textarea id="journalText" class="form-control" placeholder="Я чувствую..." required></textarea>
                </div>

                <button type="submit" class="btn btn-hero" style="width: 100%;"><i class="fas fa-save"></i> Сохранить
                    запись</button>
            </form>
            <div id="journalResult"
                style="margin-top: 20px; font-weight: bold; color: var(--secondary-color); display: none;">Запись
                успешно добавлена!</div>
        </div>
    </div>

    <script src="/tranquility/static/js/main.js"></script>
    <script>
        document.getElementById('journalForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const data = {
                mood: document.getElementById('mood').value,
                text: document.getElementById('journalText').value
            };

            fetch('/tranquility/api/submit-journal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                document.getElementById('journalResult').style.display = 'block';
                this.reset();
                setTimeout(() => { document.getElementById('journalResult').style.display = 'none'; }, 3000);
            });
        });
    </script>
</body>

</html>
