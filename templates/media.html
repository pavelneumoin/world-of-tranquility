<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир спокойствия - Аудио-терапия</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/tranquility/static/css/style.css">
    <style>
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .sound-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: var(--transition);
        }

        .sound-card:hover {
            transform: translateY(-5px);
            background: rgba(30, 41, 59, 0.7);
        }

        .sound-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Уникальные цвета для разных звуков */
        .ic-rain {
            background: linear-gradient(135deg, #3b82f6, #93c5fd);
            -webkit-background-clip: text;
        }

        .ic-forest {
            background: linear-gradient(135deg, #10b981, #d9f99d);
            -webkit-background-clip: text;
        }

        .ic-fire {
            background: linear-gradient(135deg, #ef4444, #fcd34d);
            -webkit-background-clip: text;
        }

        .ic-ocean {
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            -webkit-background-clip: text;
        }

        .sound-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .play-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .play-btn:hover {
            background: var(--primary-color);
            transform: scale(1.1);
        }

        .play-btn.playing {
            background: var(--secondary-color);
            box-shadow: 0 0 15px var(--secondary-color);
        }

        /* Стилизация ползунка громкости */
        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .global-controls {
            margin-top: 40px;
            text-align: center;
        }
    </style>
</head>

<body class="page-media">
    <nav>
        <div class="nav-container">
            <a href="/tranquility/" class="logo">
                <i class="fas fa-spa"></i>
                <span>Мир спокойствия</span>
            </a>
            <ul class="nav-links">
                <li><a href="/tranquility/">Главная</a></li>
                <li><a href="/tranquility/breathing">Дыхание</a></li>
                <li><a href="/tranquility/techniques">Техники</a></li>
                <li><a href="/tranquility/statistics">Статистика</a></li>
                <li><a href="/tranquility/questionnaire">Анкета</a></li>
                <li><a href="/tranquility/journal">Журнал</a></li>
                <li><a href="/tranquility/media" style="color: var(--secondary-color);">Медиа</a></li>
                <li><a href="/tranquility/emergency">Помощь</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1><i class="fas fa-headphones-alt"></i> Аудио-терапия</h1>
            <p style="color: var(--text-muted); max-width: 600px; margin: 10px auto;">
                Смешивайте различные фоновые шумы, чтобы создать идеальную атмосферу для расслабления, учебы или сна.
            </p>
        </div>

        <div class="player-grid">
            <!-- Звук 1 -->
            <div class="sound-card">
                <i class="fas fa-cloud-rain sound-icon ic-rain"></i>
                <h3 class="sound-title">Шум летнего дождя</h3>
                <audio id="audio-rain" loop
                    src="https://assets.mixkit.co/active_storage/sfx/1252/1252-preview.mp3"></audio>
                <button class="play-btn" onclick="toggleSound('rain')"><i class="fas fa-play"
                        id="icon-rain"></i></button>
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.5"
                    onchange="setVolume('rain', this.value)">
            </div>

            <!-- Звук 2 -->
            <div class="sound-card">
                <i class="fas fa-tree sound-icon ic-forest"></i>
                <h3 class="sound-title">Утренний лес</h3>
                <audio id="audio-forest" loop
                    src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
                <button class="play-btn" onclick="toggleSound('forest')"><i class="fas fa-play"
                        id="icon-forest"></i></button>
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.5"
                    onchange="setVolume('forest', this.value)">
            </div>

            <!-- Звук 3 -->
            <div class="sound-card">
                <i class="fas fa-fire sound-icon ic-fire"></i>
                <h3 class="sound-title">Камин в хижине</h3>
                <audio id="audio-fire" loop
                    src="https://assets.mixkit.co/active_storage/sfx/1284/1284-preview.mp3"></audio>
                <button class="play-btn" onclick="toggleSound('fire')"><i class="fas fa-play"
                        id="icon-fire"></i></button>
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.5"
                    onchange="setVolume('fire', this.value)">
            </div>

            <!-- Звук 4 -->
            <div class="sound-card">
                <i class="fas fa-water sound-icon ic-ocean"></i>
                <h3 class="sound-title">Океанский бриз</h3>
                <audio id="audio-ocean" loop
                    src="https://assets.mixkit.co/active_storage/sfx/1195/1195-preview.mp3"></audio>
                <button class="play-btn" onclick="toggleSound('ocean')"><i class="fas fa-play"
                        id="icon-ocean"></i></button>
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.5"
                    onchange="setVolume('ocean', this.value)">
            </div>
        </div>

        <div class="global-controls">
            <button class="btn btn-hero-emergency" onclick="stopAllSounds()">
                <i class="fas fa-stop-circle"></i> Остановить всё
            </button>
        </div>
    </div>

    <script src="/tranquility/static/js/main.js"></script>
    <script>
        const sounds = ['rain', 'forest', 'fire', 'ocean'];

        function toggleSound(id) {
            const audio = document.getElementById(`audio-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            const btn = icon.parentElement;

            if (audio.paused) {
                audio.play();
                icon.className = 'fas fa-pause';
                btn.classList.add('playing');
            } else {
                audio.pause();
                icon.className = 'fas fa-play';
                btn.classList.remove('playing');
            }
        }

        function setVolume(id, vol) {
            document.getElementById(`audio-${id}`).volume = vol;
        }

        function stopAllSounds() {
            sounds.forEach(id => {
                const audio = document.getElementById(`audio-${id}`);
                const icon = document.getElementById(`icon-${id}`);
                const btn = icon.parentElement;

                audio.pause();
                icon.className = 'fas fa-play';
                btn.classList.remove('playing');
            });
        }
    </script>
</body>

</html>
