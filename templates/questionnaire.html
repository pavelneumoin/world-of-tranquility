<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир спокойствия - Анкета</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/tranquility/static/css/style.css">
</head>

<body class="page-questionnaire">
    <nav>
        <div class="nav-container">
            <a href="/tranquility/" class="logo">
                <i class="fas fa-spa"></i>
                <span>Мир спокойствия</span>
            </a>
            <ul class="nav-links">
                <li><a href="/tranquility/">Главная</a></li>
                <li><a href="/tranquility/breathing">Дыхание</a></li>
                <li><a href="/tranquility/techniques">Техники</a></li>
                <li><a href="/tranquility/statistics">Статистика</a></li>
                <li><a href="/tranquility/questionnaire" style="color: var(--secondary-color);">Анкета</a></li>
                <li><a href="/tranquility/journal">Журнал</a></li>
                <li><a href="/tranquility/media">Медиа</a></li>
                <li><a href="/tranquility/emergency">Помощь</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width: 800px; margin-top: 3rem; margin-bottom: 3rem;">
        <div class="stress-tracker" style="text-align: left;">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-clipboard-list"></i> Рефлексия до и после</h2>
            <p style="margin-bottom: 30px;">Сравните свои ощущения до начала практики и после её завершения.</p>

            <form id="qForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <!-- До практики -->
                    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;">
                        <h3 style="margin-bottom: 15px; color: #a371f7;">ДО практики</h3>
                        <div class="form-group">
                            <label>Уровень напряжения (1-10):</label>
                            <input type="number" id="stress-before" class="form-control" min="1" max="10" required>
                        </div>
                        <div class="form-group">
                            <label>Физические ощущения:</label>
                            <input type="text" id="body-before" class="form-control"
                                placeholder="Комок в горле, напряжение в плечах..." required>
                        </div>
                    </div>

                    <!-- После практики -->
                    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;">
                        <h3 style="margin-bottom: 15px; color: #56d364;">ПОСЛЕ практики</h3>
                        <div class="form-group">
                            <label>Уровень напряжения (1-10):</label>
                            <input type="number" id="stress-after" class="form-control" min="1" max="10" required>
                        </div>
                        <div class="form-group">
                            <label>Физические ощущения:</label>
                            <input type="text" id="body-after" class="form-control"
                                placeholder="Расслабленность, тепло..." required>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>Какую технику вы использовали?</label>
                    <select id="technique" class="form-control" required
                        style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
                        <option value="Дыхание 4-7-8" style="color: #000;">Дыхание 4-7-8</option>
                        <option value="Квадратное дыхание" style="color: #000;">Квадратное дыхание</option>
                        <option value="Медитация" style="color: #000;">Медитация звуков</option>
                        <option value="Заземление" style="color: #000;">Заземление 5-4-3-2-1</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-hero" style="width: 100%; margin-top: 20px;"><i
                        class="fas fa-paper-plane"></i> Отправить анкету</button>
            </form>
            <div id="qResult"
                style="margin-top: 20px; font-weight: bold; color: var(--secondary-color); display: none;">Анкета
                успешно сохранена в базе.</div>
        </div>
    </div>

    <script src="/tranquility/static/js/main.js"></script>
    <script>
        document.getElementById('qForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const data = {
                before: {
                    stress: document.getElementById('stress-before').value,
                    body: document.getElementById('body-before').value
                },
                after: {
                    stress: document.getElementById('stress-after').value,
                    body: document.getElementById('body-after').value
                },
                technique: document.getElementById('technique').value
            };

            fetch('/tranquility/api/submit-feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                document.getElementById('qResult').style.display = 'block';
                this.reset();
                setTimeout(() => { document.getElementById('qResult').style.display = 'none'; }, 3000);
            });
        });
    </script>
</body>

</html>
