<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир спокойствия - Статистика</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/tranquility/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 2rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .chart-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 3rem;
            position: relative;
            height: 400px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="page-statistics">
    <nav>
        <div class="nav-container">
            <a href="/tranquility/" class="logo">
                <i class="fas fa-spa"></i>
                <span>Мир спокойствия</span>
            </a>
            <ul class="nav-links">
                <li><a href="/tranquility/">Главная</a></li>
                <li><a href="/tranquility/breathing">Дыхание</a></li>
                <li><a href="/tranquility/techniques">Техники</a></li>
                <li><a href="/tranquility/statistics" style="color: var(--secondary-color);">Статистика</a></li>
                <li><a href="/tranquility/questionnaire">Анкета</a></li>
                <li><a href="/tranquility/journal">Журнал</a></li>
                <li><a href="/tranquility/media">Медиа</a></li>
                <li><a href="/tranquility/emergency">Помощь</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 style="text-align: center; margin-top: 2rem;"><i class="fas fa-chart-line"></i> Ваша аналитика</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">
            Отслеживайте динамику вашего эмоционального состояния и эффективность практик.
        </p>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-clipboard-check stat-icon"></i>
                <div class="stat-value" id="val-questionnaires">-</div>
                <div class="stat-label">Заполненных анкет</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-book stat-icon"></i>
                <div class="stat-value" id="val-journals">-</div>
                <div class="stat-label">Записей в дневнике</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-heartbeat stat-icon"></i>
                <div class="stat-value" id="val-logs">-</div>
                <div class="stat-label">Оценок стресса</div>
            </div>
        </div>

        <div class="chart-container">
            <h3 style="margin-bottom: 20px; color: #fff;">График уровня стресса</h3>
            <canvas id="stressChart"></canvas>
        </div>
    </div>

    <script src="/tranquility/static/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetch('/tranquility/api/stats')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Обновляем карточки
                        document.getElementById('val-questionnaires').textContent = data.data.questionnaires_count;
                        document.getElementById('val-journals').textContent = data.data.journal_entries_count;
                        document.getElementById('val-logs').textContent = data.data.stress_logs_count;

                        // Отрисовываем график
                        const logs = data.data.stress_logs_data || [];
                        renderChart(logs);
                    }
                })
                .catch(err => console.error("Ошибка загрузки статистики:", err));
        });

        function renderChart(logs) {
            const ctx = document.getElementById('stressChart').getContext('2d');

            if (logs.length === 0) {
                // Если нет данных, покажем плейсхолдер
                logs = [
                    { timestamp: new Date(Date.now() - 86400000 * 4).toISOString(), level: 7 },
                    { timestamp: new Date(Date.now() - 86400000 * 3).toISOString(), level: 5 },
                    { timestamp: new Date(Date.now() - 86400000 * 2).toISOString(), level: 6 },
                    { timestamp: new Date(Date.now() - 86400000 * 1).toISOString(), level: 3 },
                    { timestamp: new Date().toISOString(), level: 2 }
                ];
            }

            // Сортировка по времени
            logs.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            const labels = logs.map(log => {
                const d = new Date(log.timestamp);
                return `${d.getDate()}.${d.getMonth() + 1} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
            });

            const dataPoints = logs.map(log => log.level);

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(16, 185, 129, 0.5)'); // secondary color 
            gradient.addColorStop(1, 'rgba(16, 185, 129, 0.0)');

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Уровень стресса (1-10)',
                        data: dataPoints,
                        borderColor: '#10b981',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#10b981',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        fill: true,
                        tension: 0.4 // Smooth curves
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#e2e8f0' }
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 10,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)',
                                drawBorder: false
                            },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)',
                                drawBorder: false
                            },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
